name: Build All Platforms (Windows/macOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3)"
        required: true
        default: "1.3"
  push:
    tags:
      - 'v*'

jobs:
  windows:
    name: Build Windows (EXE + Setup)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      
      - name: Build EXE + Setup
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_setup.ps1 -Version ${{ github.event.inputs.version || '1.3' }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/Leta_Pipeline_v1_3.exe
            dist/Leta_Takip_Setup_v1_3.exe
          retention-days: 30

  macos:
    name: Build macOS (APP + DMG + PKG)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt
      
      - name: Make scripts executable
        run: chmod +x scripts/*.sh installer/*.sh
      
      - name: Build APP with PyInstaller
        run: |
          cd Leta-Takip-main
          pyinstaller --noconfirm --clean Leta_Pipeline_Final.spec
      
      - name: Build DMG
        run: |
          cd Leta-Takip-main
          bash installer/Leta_Setup_Mac_DMG.sh ${{ github.event.inputs.version || '1.3' }}
      
      - name: Build PKG
        run: |
          cd Leta-Takip-main
          bash installer/Leta_Setup_Mac_PKG.sh ${{ github.event.inputs.version || '1.3' }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            Leta-Takip-main/dist/*.app
            Leta-Takip-main/dist/*.dmg
            Leta-Takip-main/dist/*.pkg
          retention-days: 30

  create-release:
    name: Create Release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: ./windows
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: ./macos
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows/*
            macos/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

