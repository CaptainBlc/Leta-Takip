name: Build All Platforms (Windows/macOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3.1)"
        required: true
        default: "1.3"
      source_ref:
        description: "Build source branch/tag/SHA (exact: codex/feature-x, develop, v1.3.1; shorthand: codex if only one codex/* exists)"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

jobs:
  windows:
    name: Build Windows (EXE + Setup)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref (Windows)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.source_ref }}".Trim()
          if ([string]::IsNullOrWhiteSpace($ref)) {
            Write-Host "source_ref boş; tetikleyen commit/ref kullanılacak."
            exit 0
          }

          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"

          $headOk = git ls-remote --exit-code --heads origin "$ref" 2>$null
          $tagOk = git ls-remote --exit-code --tags origin "$ref" 2>$null
          $target = $null

          if ($LASTEXITCODE -eq 0 -and $tagOk) {
            $target = $ref
          }
          if ($headOk) {
            $target = $ref
          }

          if (-not $target) {
            $matches = @(git for-each-ref --format='%(refname:short)' "refs/remotes/origin/$ref/*")
            if ($matches.Count -eq 1) {
              $target = ($matches[0] -replace '^origin/', '')
              Write-Host "Shorthand source_ref çözüldü: $ref -> $target"
            } elseif ($matches.Count -gt 1) {
              Write-Error "source_ref '$ref' birden fazla branch ile eşleşiyor: $($matches -join ', '). Lütfen tam branch adı girin."
              exit 1
            } else {
              Write-Error "source_ref '$ref' bulunamadı. Lütfen tam branch/tag/SHA girin (örn: codex/analyze-and-fix-integr...)."
              exit 1
            }
          }

          git checkout --force "$target"
          Write-Host "Checkout başarılı: $target"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build EXE + Setup
        shell: pwsh
        run: ./scripts/build_setup.ps1 -Version "${{ github.event.inputs.version || '1.3' }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/Leta_Pipeline_v*.exe
            dist/Leta_Takip_Setup_v*.exe
          if-no-files-found: error
          retention-days: 30

  macos:
    name: Build macOS (APP + DMG + PKG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref (macOS)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.source_ref }}"
          REF="$(echo "$REF" | xargs)"

          if [ -z "$REF" ]; then
            echo "source_ref boş; tetikleyen commit/ref kullanılacak."
            exit 0
          fi

          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"

          TARGET=""
          if git ls-remote --exit-code --heads origin "$REF" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$REF" >/dev/null 2>&1; then
            TARGET="$REF"
          else
            mapfile -t MATCHES < <(git for-each-ref --format='%(refname:short)' "refs/remotes/origin/$REF/*")
            if [ "${#MATCHES[@]}" -eq 1 ]; then
              TARGET="${MATCHES[0]#origin/}"
              echo "Shorthand source_ref çözüldü: $REF -> $TARGET"
            elif [ "${#MATCHES[@]}" -gt 1 ]; then
              echo "::error::source_ref '$REF' birden fazla branch ile eşleşiyor: ${MATCHES[*]}. Lütfen tam branch adı girin."
              exit 1
            else
              echo "::error::source_ref '$REF' bulunamadı. Lütfen tam branch/tag/SHA girin (örn: codex/analyze-and-fix-integr...)."
              exit 1
            fi
          fi

          git checkout --force "$TARGET"
          echo "Checkout başarılı: $TARGET"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build macOS artifacts
        run: |
          VERSION="${{ github.event.inputs.version || '1.3' }}"
          bash scripts/build_macos.sh "$VERSION"
          bash scripts/build_macos_dmg.sh "$VERSION"
          bash scripts/build_macos_pkg.sh "$VERSION"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.app
            dist/*.dmg
            dist/*.pkg
          if-no-files-found: error
          retention-days: 30

  create-release:
    name: Create Release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: ./windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: ./macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/*
            macos/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
