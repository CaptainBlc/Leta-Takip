# Leta Takip - Tüm platformlar (tag v* veya manuel)
# macOS öncelikli; kullanıcı kurulumu için DMG + Windows Setup.
name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (örn. 1.3)"
        required: true
        default: "1.3"
  push:
    tags:
      - 'v*'

jobs:
  macos:
    name: macOS (APP + DMG + PKG)
    runs-on: macos-latest
    env:
      VERSION: ${{ github.event.inputs.version || '1.3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Make scripts executable
        run: chmod +x scripts/*.sh installer/*.sh

      - name: Build .app (Leta_Pipeline_Mac.spec)
        run: pyinstaller --noconfirm --clean Leta_Pipeline_Mac.spec

      - name: Build DMG
        run: bash installer/Leta_Setup_Mac_DMG.sh ${{ env.VERSION }}

      - name: Build PKG (varsa)
        run: |
          if [ -d "dist/Leta_Pipeline_v1_3.app" ]; then
            bash installer/Leta_Setup_Mac_PKG.sh ${{ env.VERSION }} || true
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.app
            dist/*.dmg
            dist/*.pkg
          retention-days: 30

  windows:
    name: Windows (EXE + Setup)
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event.inputs.version || '1.3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build EXE + Setup
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_setup.ps1 -Version ${{ env.VERSION }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/Leta_Pipeline_v1_3.exe
            dist/Leta_Takip_Setup_v1_3.exe
          retention-days: 30

  create-release:
    name: Create Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: ./macos

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: ./windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos/*
            windows/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
