name: Build Leta Takip (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3.1)"
        required: true
        default: "1.3"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build
        shell: pwsh
        run: ./scripts/build_setup.ps1 -Version "${{ github.event.inputs.version }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/Leta_Pipeline_v*.exe
            dist/Leta_Takip_Setup_v*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Build
        run: |
          VERSION="${{ github.event.inputs.version }}"
          bash scripts/build_macos.sh "$VERSION"
          bash scripts/build_macos_dmg.sh "$VERSION"
          bash scripts/build_macos_pkg.sh "$VERSION"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.app
            dist/*.dmg
            dist/*.pkg
          if-no-files-found: error
