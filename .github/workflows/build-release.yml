name: Build Leta Takip (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3.1)"
        required: true
        default: "1.3"
      source_ref:
        description: "Build source branch/tag/SHA (exact: codex/feature-x, develop, v1.3.1; shorthand: codex if only one codex/* exists)"
        required: false
        default: ""

jobs:
  build-windows:
    name: Windows (EXE + Setup)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref (Windows)
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.source_ref }}".Trim()
          if ([string]::IsNullOrWhiteSpace($ref)) {
            Write-Host "source_ref boş; tetikleyen commit/ref kullanılacak."
            exit 0
          }

          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"

          $headOk = git ls-remote --exit-code --heads origin "$ref" 2>$null
          $tagOk = git ls-remote --exit-code --tags origin "$ref" 2>$null
          $target = $null

          if ($LASTEXITCODE -eq 0 -and $tagOk) {
            $target = $ref
          }
          if ($headOk) {
            $target = $ref
          }

          if (-not $target) {
            $matches = @(git for-each-ref --format='%(refname:short)' "refs/remotes/origin/$ref/*")
            if ($matches.Count -eq 1) {
              $target = ($matches[0] -replace '^origin/', '')
              Write-Host "Shorthand source_ref çözüldü: $ref -> $target"
            } elseif ($matches.Count -gt 1) {
              Write-Error "source_ref '$ref' birden fazla branch ile eşleşiyor: $($matches -join ', '). Lütfen tam branch adı girin."
              exit 1
            } else {
              Write-Error "source_ref '$ref' bulunamadı. Lütfen tam branch/tag/SHA girin (örn: codex/analyze-and-fix-integr...)."
              exit 1
            }
          }

          git checkout --force "$target"
          Write-Host "Checkout başarılı: $target"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build
        shell: pwsh
        run: ./scripts/build_setup.ps1 -Version "${{ github.event.inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/Leta_Pipeline_v*.exe
            dist/Leta_Takip_Setup_v*.exe
          if-no-files-found: error

  build-macos:
    name: macOS (APP + DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref (macOS)
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.source_ref }}"
          REF="$(echo "$REF" | xargs)"

          if [ -z "$REF" ]; then
            echo "source_ref boş; tetikleyen commit/ref kullanılacak."
            exit 0
          fi

          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"

          TARGET=""
          if git ls-remote --exit-code --heads origin "$REF" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$REF" >/dev/null 2>&1; then
            TARGET="$REF"
          else
            MATCHES_RAW="$(git for-each-ref --format='%(refname:short)' "refs/remotes/origin/$REF/*")"
            MATCH_COUNT=$(printf '%s\n' "$MATCHES_RAW" | sed '/^$/d' | wc -l | tr -d ' ')
            if [ "$MATCH_COUNT" -eq 1 ]; then
              TARGET="$(printf '%s\n' "$MATCHES_RAW" | sed '/^$/d' | head -n1)"
              TARGET="${TARGET#origin/}"
              echo "Shorthand source_ref çözüldü: $REF -> $TARGET"
            elif [ "$MATCH_COUNT" -gt 1 ]; then
              echo "::error::source_ref '$REF' birden fazla branch ile eşleşiyor: $(printf '%s' "$MATCHES_RAW" | tr '\n' ' '). Lütfen tam branch adı girin."
              exit 1
            else
              echo "::error::source_ref '$REF' bulunamadı. Lütfen tam branch/tag/SHA girin (örn: codex/analyze-and-fix-integr...)."
              exit 1
            fi
          fi

          git checkout --force "$TARGET"
          echo "Checkout başarılı: $TARGET"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build
        run: |
          VERSION="${{ github.event.inputs.version }}"
          bash scripts/build_macos.sh "$VERSION"
          bash scripts/build_macos_dmg.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.app
            dist/*.dmg
          if-no-files-found: error
