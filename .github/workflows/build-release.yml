name: Build Leta Takip (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3.1)"
        required: true
        default: "1.3"
      source_ref:
        description: "Build source branch/tag/SHA (e.g. codex/feature-x, develop, v1.3.1)"
        required: false
        default: ""

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref (Windows)
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.source_ref }}".Trim()
          if ([string]::IsNullOrWhiteSpace($ref)) {
            Write-Host "source_ref boş; tetikleyen commit/ref kullanılacak."
            exit 0
          }

          Write-Host "source_ref deneniyor: $ref"
          git fetch --tags --force origin

          $headOk = (git ls-remote --heads origin $ref)
          $tagOk = (git ls-remote --tags origin $ref)

          if ($headOk -or $tagOk) {
            git checkout --force $ref
            Write-Host "Checkout başarılı: $ref"
          } else {
            Write-Warning "source_ref '$ref' bulunamadı. Workflow tetikleyen commit/ref ile devam ediliyor."
          }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build
        shell: pwsh
        run: ./scripts/build_setup.ps1 -Version "${{ github.event.inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/Leta_Pipeline_v*.exe
            dist/Leta_Takip_Setup_v*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref (macOS)
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.source_ref }}"
          REF="$(echo "$REF" | xargs)"

          if [ -z "$REF" ]; then
            echo "source_ref boş; tetikleyen commit/ref kullanılacak."
            exit 0
          fi

          echo "source_ref deneniyor: $REF"
          git fetch --tags --force origin

          if git ls-remote --exit-code --heads origin "$REF" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$REF" >/dev/null 2>&1; then
            git checkout --force "$REF"
            echo "Checkout başarılı: $REF"
          else
            echo "::warning::source_ref '$REF' bulunamadı. Workflow tetikleyen commit/ref ile devam ediliyor."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build
        run: |
          VERSION="${{ github.event.inputs.version }}"
          bash scripts/build_macos.sh "$VERSION"
          bash scripts/build_macos_dmg.sh "$VERSION"
          bash scripts/build_macos_pkg.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.app
            dist/*.dmg
            dist/*.pkg
          if-no-files-found: error
