# Leta Takip - Güncel sürüm build (script/ sistemi)
# macOS: .app + DMG (kullanıcı kurulumu). Windows: EXE + Setup.
name: Build Leta Takip (Release)

on:
  push:
    branches: [ "develop", "main" ]
  workflow_dispatch:

env:
  VERSION: "1.3"
  APP_NAME: "Leta_Pipeline_v1_3"

jobs:
  # --- macOS: .app + DMG (kullanıcı macOS kullanıcısı için öncelikli) ---
  build-macos:
    name: macOS (APP + DMG)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller ttkbootstrap pandas reportlab openpyxl Pillow tkcalendar

      - name: Make scripts executable
        run: chmod +x scripts/*.sh installer/*.sh

      - name: Build .app (onedir – DMG için)
        run: pyinstaller --noconfirm --clean Leta_Pipeline_Mac.spec

      - name: Build DMG
        run: bash installer/Leta_Setup_Mac_DMG.sh ${{ env.VERSION }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Leta_Takip_macOS_v${{ env.VERSION }}
          path: |
            dist/Leta_Pipeline_v1_3.app
            dist/Leta_Takip_${{ env.VERSION }}.dmg

  # --- Windows: EXE + Setup ---
  build-windows:
    name: Windows (EXE + Setup)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller ttkbootstrap pandas reportlab openpyxl Pillow tkcalendar

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build EXE (onefile)
        run: pyinstaller --noconfirm --clean Leta_Pipeline_Final.spec

      - name: Build Setup (Inno)
        run: iscc installer\Leta_Setup_Windows.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Leta_Takip_Windows_v${{ env.VERSION }}
          path: |
            dist/Leta_Pipeline_v1_3.exe
            dist/Leta_Takip_Setup_v1_3.exe
