name: Build Release (Windows/macOS/Linux)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0)"
        required: true
        default: "1.0"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Install Inno Setup (for installer)
        run: choco install innosetup --no-progress -y
      - name: Build EXE + Setup
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_setup.ps1 -Version ${{ inputs.version }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/Leta_Yonetim_Paneli_v1_0.exe
            installer/Leta_Yonetim_Setup_v1_0.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Build DMG
        run: bash scripts/build_macos_dmg.sh ${{ inputs.version }}
      - name: Build PKG
        run: bash scripts/build_macos_pkg.sh ${{ inputs.version }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
            dist/*.pkg

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update
          # AppImage tool requires FUSE on some runners
          sudo apt-get install -y ruby ruby-dev build-essential rpm fuse3 || true
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true
          sudo gem install --no-document fpm
      - name: Install python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Build AppImage
        run: bash scripts/build_linux_appimage.sh ${{ inputs.version }}
      - name: Build DEB/RPM
        run: bash scripts/build_linux_packages.sh ${{ inputs.version }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm


