name: Build Leta Takip v1.3 (Win & Mac)

on:
  push:
    branches: [ "develop" ]  # ARTIK DEVELOP DALINI DİNLİYOR
  workflow_dispatch:         # Manuel tetikleme için
    inputs:
      version:
        description: "Versiyon"
        required: true
        default: "1.3"

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ttkbootstrap pandas reportlab openpyxl Pillow

      - name: Build EXE with PyInstaller
        run: |
          # Tek satırda build komutu (Script dosyasına gerek yok)
          pyinstaller --noconfirm --onefile --windowed --name "Leta_Takip_v1.3" --hidden-import=ttkbootstrap --hidden-import=reportlab leta_app.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Leta_Takip_Windows_v1.3
          path: dist/Leta_Takip_v1.3.exe

  # --- MACOS BUILD ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller ttkbootstrap pandas reportlab openpyxl Pillow

      - name: Create Icon (Varsa)
        run: |
          if [ -f logo.png ]; then
            mkdir Leta.iconset
            sips -z 64 64   logo.png --out Leta.iconset/icon_32x32@2x.png
            iconutil -c icns Leta.iconset -o logo.icns
          fi

      - name: Build APP with PyInstaller
        run: |
          # Mac build komutu
          pyinstaller --noconfirm --onefile --windowed --name "Leta_Takip_v1.3" --hidden-import=ttkbootstrap --hidden-import=reportlab --icon=logo.icns leta_app.py

      - name: Create DMG Installer
        run: |
          # DMG oluşturma işlemi (Manuel script yerine buraya gömüldü)
          mkdir -p dist_dmg
          cp -r "dist/Leta_Takip_v1.3.app" dist_dmg/
          # Kullanım kılavuzunu da ekleyelim
          if [ -f KULLANIM_KILAVUZU.txt ]; then cp KULLANIM_KILAVUZU.txt dist_dmg/; fi
          
          # DMG oluştur
          hdiutil create -volname "Leta Takip v1.3" -srcfolder dist_dmg -ov -format UDZO "dist/Leta_Takip_v1.3.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Leta_Takip_Mac_DMG_v1.3
          path: dist/Leta_Takip_v1.3.dmg
