# Build Leta Takip v1.3 (Fixed) - PyInstaller tek dosya EXE/DMG
name: Build Leta Takip v1.3 (Fixed)

on:
  push:
    branches: [ "develop", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ttkbootstrap pandas reportlab openpyxl Pillow tkcalendar

      - name: EXE Oluştur
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Leta_Takip_v1.3" --collect-all ttkbootstrap --hidden-import=pandas --hidden-import=openpyxl --hidden-import=reportlab --hidden-import=tkcalendar --hidden-import=PIL --hidden-import=PIL._tkinter_finder leta_app.py

      - name: Dosyayı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Leta_Takip_Windows_v1.3
          path: dist/Leta_Takip_v1.3.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri Yükle
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller ttkbootstrap pandas reportlab openpyxl Pillow tkcalendar

      - name: İkon Oluştur
        run: |
          if [ -f logo.png ]; then
            mkdir -p Leta.iconset
            sips -z 64 64 logo.png --out Leta.iconset/icon_32x32@2x.png
            iconutil -c icns Leta.iconset -o logo.icns
          fi

      - name: APP Build
        run: |
          if [ -f logo.icns ]; then
            pyinstaller --noconfirm --onefile --windowed --name "Leta_Takip_v1.3" --collect-all ttkbootstrap --hidden-import=pandas --hidden-import=openpyxl --hidden-import=reportlab --hidden-import=tkcalendar --hidden-import=PIL --hidden-import=PIL._tkinter_finder --icon=logo.icns leta_app.py
          else
            pyinstaller --noconfirm --onefile --windowed --name "Leta_Takip_v1.3" --collect-all ttkbootstrap --hidden-import=pandas --hidden-import=openpyxl --hidden-import=reportlab --hidden-import=tkcalendar --hidden-import=PIL --hidden-import=PIL._tkinter_finder leta_app.py
          fi

      - name: DMG Paketleme
        run: |
          mkdir -p dist_dmg
          if [ -d "dist/Leta_Takip_v1.3.app" ]; then
            cp -r "dist/Leta_Takip_v1.3.app" dist_dmg/
          else
            echo "Uyarı: .app bulunamadı, dist içeriği:" && ls -la dist/
            exit 1
          fi
          hdiutil create -volname "Leta Takip v1.3" -srcfolder dist_dmg -ov -format UDZO "dist/Leta_Takip_v1.3.dmg"

      - name: Dosyayı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Leta_Takip_Mac_DMG_v1.3
          path: dist/Leta_Takip_v1.3.dmg
